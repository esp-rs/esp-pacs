INTERRUPT_CORE0:
  INT_STATUS_REG_2:
    _modify:
      INT_STATUS_2:
        bitWidth: 32
  _array:
    INT_STATUS_REG_*:
      name: CORE_0_INTR_STATUS%s
      description: "Represents the status of the interrupt sources. Each bit corresponds to one interrupt source"

  _delete:
    - "*_MAP"

  _add:
    CORE_0_INTR_MAP%s:
      addressOffset: 0
      dim: 66 # last register is at 0x104
      dimIncrement: 4
      access: read-write
      size: 32
      reset-value: 0
