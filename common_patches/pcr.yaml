UART?_CONF:
  _strip:
    UART?_

UART?_SCLK_CONF:
  _strip:
    UART?_

UART?_PD_CTRL:
  _strip:
    UART?_

TIMERGROUP?_CONF:
  _strip:
    TG?_

TIMERGROUP?_TIMER_CLK_CONF:
  _strip:
    TG?_

TIMERGROUP?_WDT_CLK_CONF:
  _strip:
    TG?_

_cluster:
  UART%s:
    UART?_CONF:
      name: CONF
    UART?_SCLK_CONF:
      name: CLK_CONF
    UART?_PD_CTRL:
      name: PD_CTRL

  TIMERGROUP%s:
    TIMERGROUP?_CONF:
      name: CONF
    TIMERGROUP?_TIMER_CLK_CONF:
      name: TIMER_CLK_CONF
    TIMERGROUP?_WDT_CLK_CONF:
      name: WDT_CLK_CONF

_array:
  I2C*_SCLK_CONF:
    name: I2C%s_SCLK_CONF

I2C*_SCLK_CONF:
  _modify:
    I2C*_SCLK_DIV_A:
      name: I2C_SCLK_DIV_A
    I2C*_SCLK_DIV_B:
      name: I2C_SCLK_DIV_B
    I2C*_SCLK_DIV_NUM:
      name: I2C_SCLK_DIV_NUM
    I2C*_SCLK_SEL:
      name: I2C_SCLK_SEL
    I2C*_SCLK_EN:
      name: I2C_SCLK_EN
