# Flash cache MMU tables for PRO and APP CPUs (DR_REG_FLASH_MMU_TABLE_*).
_add:
  MMU_TABLE:
    description: PRO CPU flash cache MMU table
    groupName: MMU
    baseAddress: 0x3FF10000
    addressBlock:
      offset: 0x0
      size: 0x100
      usage: registers
    registers:
      ENTRY%s:
        description: Flash MMU table entry
        addressOffset: 0x0
        dim: 64
        dimIndex: 0-63
        dimIncrement: 0x4
        size: 0x20
        access: read-write
        fields:
          PADDR:
            description: Physical page number
            bitOffset: 0
            bitWidth: 8
            access: read-write
          INVALID:
            description: Set to mark this entry invalid
            bitOffset: 8
            bitWidth: 1
            access: read-write

  APP_MMU_TABLE:
    description: APP CPU flash cache MMU table
    groupName: MMU
    baseAddress: 0x3FF12000
    addressBlock:
      offset: 0x0
      size: 0x100
      usage: registers
    registers:
      ENTRY%s:
        description: Flash MMU table entry
        addressOffset: 0x0
        dim: 64
        dimIndex: 0-63
        dimIncrement: 0x4
        size: 0x20
        access: read-write
        fields:
          PADDR:
            description: Physical page number
            bitOffset: 0
            bitWidth: 8
            access: read-write
          INVALID:
            description: Set to mark this entry invalid
            bitOffset: 8
            bitWidth: 1
            access: read-write
