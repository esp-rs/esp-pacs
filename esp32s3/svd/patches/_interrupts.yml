INTERRUPT_CORE0:
  _array:
    INTR_STATUS_*:
      name: CORE_0_INTR_STATUS%s

  _delete:
    - "*_MAP"

  _add:
    CORE_0_INTR_MAP%s:
      addressOffset: 0
      dim: 99 # last register is at 0x188
      dimIncrement: 4
      access: read-write
      size: 32
      reset-value: 16
      fields:
        MAP:
          bitOffset: 0
          bitWidth: 5
          access: read-write

INTERRUPT_CORE1:
  _array:
    INTR_STATUS_*:
      name: CORE_1_INTR_STATUS%s

  _delete:
    - "*_MAP"

  _add:
    CORE_1_INTR_MAP%s:
      addressOffset: 0x800
      dim: 99 # last register is at 0x988
      dimIncrement: 4
      access: read-write
      size: 32
      reset-value: 16
      fields:
        MAP:
          bitOffset: 0
          bitWidth: 5
          access: read-write
