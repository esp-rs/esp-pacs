AHB_DMA:
  # Strip _CH?_INT_* suffixes from interrupt register field names
  "IN_INT_RAW_CH?":
    _strip_end: [_CH_INT_RAW, _CH?_INT_RAW]
  "IN_INT_ST_CH?":
    _strip_end: [_CH_INT_ST, _CH?_INT_ST]
  "IN_INT_ENA_CH?":
    _strip_end: [_CH_INT_ENA, _CH?_INT_ENA]
  "IN_INT_CLR_CH?":
    _strip_end: [_CH_INT_CLR, _CH?_INT_CLR]
    _modify:
      "*":
        modifiedWriteValues: oneToClear
  "OUT_INT_RAW_CH?":
    _strip_end: [_CH_INT_RAW, _CH?_INT_RAW]
  "OUT_INT_ST_CH?":
    _strip_end: [_CH_INT_ST, _CH?_INT_ST]
  "OUT_INT_ENA_CH?":
    _strip_end: [_CH_INT_ENA, _CH?_INT_ENA]
  "OUT_INT_CLR_CH?":
    _strip_end: [_CH_INT_CLR, _CH?_INT_CLR]
    _modify:
      "*":
        modifiedWriteValues: oneToClear

  # Strip _CH? suffix from channel register field names
  "IN_CONF0_CH?":
    _strip_end: _CH?
  "IN_CONF1_CH?":
    _strip_end: _CH?
  "INFIFO_STATUS_CH?":
    _strip_end: _CH?
  "IN_POP_CH?":
