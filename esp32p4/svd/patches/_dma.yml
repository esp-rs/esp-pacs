  "IN_SUC_EOF_DES_ADDR_CH?":
    _strip_end: _CH?
  "IN_ERR_EOF_DES_ADDR_CH?":
    _strip_end: _CH?
  "IN_DSCR_CH?":
    _strip_end: _CH?
  "IN_DSCR_BF0_CH?":
    _strip_end: _CH?
  "IN_DSCR_BF1_CH?":
    _strip_end: _CH?
  "IN_PERI_CH?":
    _strip_end: _CH?
  "IN_PERI_SEL_CH?":
    _strip_end: _CH?
  "OUT_CONF0_CH?":
    _strip_end: _CH?
  "OUT_CONF1_CH?":
    _strip_end: _CH?
  "OUTFIFO_STATUS_CH?":
    _strip_end: _CH?
  "OUT_PUSH_CH?":
    _strip_end: _CH?
  "OUT_LINK_CH?":
    _strip_end: _CH?
  "OUT_STATE_CH?":
    _strip_end: _CH?
  "OUT_EOF_DES_ADDR_CH?":
    _strip_end: _CH?
  "OUT_EOF_BFR_DES_ADDR_CH?":
    _strip_end: _CH?
  "OUT_DSCR_CH?":
    _strip_end: _CH?
  "OUT_DSCR_BF0_CH?":
    _strip_end: _CH?
  "OUT_DSCR_BF1_CH?":
    _strip_end: _CH?
  "OUT_PERI_CH?":
    _strip_end: _CH?
  "OUT_PERI_SEL_CH?":
    _strip_end: _CH?

  # Strip _CH? from IN/OUT_LINK_ADDR field names and convert to dim arrays
  "IN_LINK_ADDR_CH?":
    _strip_end: _CH?
  "OUT_LINK_ADDR_CH?":
    _strip_end: _CH?
  _array:
    IN_LINK_ADDR_CH?:
      name: IN_LINK_ADDR_CH%s
    OUT_LINK_ADDR_CH?:
      name: OUT_LINK_ADDR_CH%s

  _cluster:
    IN_INT_CH%s:
      IN_INT_RAW_CH?:
        name: RAW
      IN_INT_ST_CH?:
        name: ST
      IN_INT_ENA_CH?:
        name: ENA
      IN_INT_CLR_CH?:
        name: CLR
        _modify:
          "*":
            modifiedWriteValues: oneToClear

    OUT_INT_CH%s:
      OUT_INT_RAW_CH?:
        name: RAW
      OUT_INT_ST_CH?:
        name: ST
      OUT_INT_ENA_CH?:
        name: ENA
      OUT_INT_CLR_CH?:
        name: CLR
        _modify:
          "*":
            modifiedWriteValues: oneToClear

    CH%s:
      IN_CONF0_CH?:
        name: IN_CONF0
      IN_CONF1_CH?:
        name: IN_CONF1
      INFIFO_STATUS_CH?:
        name: INFIFO_STATUS
      IN_POP_CH?:
        name: IN_POP
      IN_LINK_CH?:
        name: IN_LINK
      IN_STATE_CH?:
        name: IN_STATE
      IN_SUC_EOF_DES_ADDR_CH?:
        name: IN_SUC_EOF_DES_ADDR
      IN_ERR_EOF_DES_ADDR_CH?:
        name: IN_ERR_EOF_DES_ADDR
      IN_DSCR_CH?:
        name: IN_DSCR
      IN_DSCR_BF0_CH?:
        name: IN_DSCR_BF0
      IN_DSCR_BF1_CH?:
        name: IN_DSCR_BF1
      IN_PERI_CH?:
        name: IN_PRI
      IN_PERI_SEL_CH?:
        name: IN_PERI_SEL
      OUT_CONF0_CH?:
        name: OUT_CONF0
      OUT_CONF1_CH?:
        name: OUT_CONF1
      OUTFIFO_STATUS_CH?:
        name: OUTFIFO_STATUS
      OUT_PUSH_CH?:
        name: OUT_PUSH
      OUT_LINK_CH?:
        name: OUT_LINK
      OUT_STATE_CH?:
        name: OUT_STATE
      OUT_EOF_DES_ADDR_CH?:
        name: OUT_EOF_DES_ADDR
      OUT_EOF_BFR_DES_ADDR_CH?:
        name: OUT_EOF_BFR_DES_ADDR
      OUT_DSCR_CH?:
        name: OUT_DSCR
      OUT_DSCR_BF0_CH?:
        name: OUT_DSCR_BF0
      OUT_DSCR_BF1_CH?:
        name: OUT_DSCR_BF1
      OUT_PERI_CH?:
        name: OUT_PRI
      OUT_PERI_SEL_CH?:
        name: OUT_PERI_SEL

