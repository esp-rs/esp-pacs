H264_DMA:
  _copy:
    OUT_RO_STATUS_CH1:
      _from: OUT_RO_STATUS_CH0
      addressOffset: 0x140
    OUT_RO_STATUS_CH2:
      _from: OUT_RO_STATUS_CH0
