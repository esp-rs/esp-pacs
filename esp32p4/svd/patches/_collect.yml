      addressOffset: 0x150
    OUT_MODE_ENABLE_CH2:
      _from: OUT_MODE_ENABLE_CH0
      addressOffset: 0x250
    OUT_MODE_ENABLE_CH3:
      _from: OUT_MODE_ENABLE_CH0
      addressOffset: 0x350
    OUT_MODE_ENABLE_CH4:
      _from: OUT_MODE_ENABLE_CH0
      addressOffset: 0x450
    OUT_MODE_YUV_CH1:
      _from: OUT_MODE_YUV_CH0
      addressOffset: 0x154
    OUT_MODE_YUV_CH2:
      _from: OUT_MODE_YUV_CH0
      addressOffset: 0x254
    OUT_MODE_YUV_CH3:
      _from: OUT_MODE_YUV_CH0
      addressOffset: 0x354
    OUT_MODE_YUV_CH4:
      _from: OUT_MODE_YUV_CH0
      addressOffset: 0x454
    IN_RO_PD_CONF_CH1:
      _from: IN_RO_PD_CONF_CH0
      addressOffset: 0x648
    IN_RO_PD_CONF_CH2:
      _from: IN_RO_PD_CONF_CH0
      addressOffset: 0x748
    IN_RO_PD_CONF_CH3:
      _from: IN_RO_PD_CONF_CH0
      addressOffset: 0x848
    IN_RO_PD_CONF_CH4:
      _from: IN_RO_PD_CONF_CH0
      addressOffset: 0x948
    OUT_BLOCK_BUF_LEN_CH0:
      _from: OUT_BLOCK_BUF_LEN_CH3
      addressOffset: 0x80
    OUT_BLOCK_BUF_LEN_CH1:
      _from: OUT_BLOCK_BUF_LEN_CH3
      addressOffset: 0x180
    OUT_BLOCK_BUF_LEN_CH2:
      _from: OUT_BLOCK_BUF_LEN_CH3
      addressOffset: 0x280

  OUT_CONF0_CH[1-4]:
    _add:
      OUT_REORDER_EN_CH0:
        description: Enable TX channel 0 macro block reorder when set to 1, only channel0 have this selection
        bitOffset: 16
        bitWidth: 1
        access: read-write
  OUT_CONF0_CH[34]:
    _add:
      OUT_RST_CH0:
        description: Write 1 then write 0 to this bit to reset TX channel
        bitOffset: 24
        bitWidth: 1
        access: read-write
      OUT_CMD_DISABLE_CH0:
        description: Write 1 before reset and write 0 after reset
        bitOffset: 25
        bitWidth: 1
        access: read-write

  OUT_STATE_CH[34]:
    _add:
      OUT_RESET_AVAIL:
        description: This register indicate that if the channel reset is safety.
        bitOffset: 24
        bitWidth: 1
        access: read-only

  OUT_ARB_CH[034]:
    _add:
      INTER_OUT_ARB_PRIORITY:
        description: Set the priority of channel
        bitOffset: 6
        bitWidth: 1
        access: read-write
  OUT_ARB_CH[12]:
    _add:
      EXTER_OUT_ARB_PRIORITY:
        description: Set the priority of channel
        bitOffset: 4
        bitWidth: 2
        access: read-write

  IN_ARB_CH[23]:
    _add:
      EXTER_IN_ARB_PRIORITY:
        description: Set the priority of channel
        bitOffset: 4
        bitWidth: 2
        access: read-write

  _cluster:
    OUT_CH%s:
      OUT_CONF0_CH?:
        name: CONF0
        description: TX CHx config0 register
        _strip_end: _CH0
      OUT_INT_RAW_CH?:
        name: INT_RAW
        description: TX CHx interrupt raw register
        _strip_end: _CH0_INT_RAW
      OUT_INT_ENA_CH?:
        name: INT_ENA
        description: TX CHx interrupt ena register
        _strip_end: _CH0_INT_ENA
      OUT_INT_ST_CH?:
        name: INT_ST
        description: TX CHx interrupt st register
        _strip_end: _CH0_INT_ST
      OUT_INT_CLR_CH?:
        name: INT_CLR
        description: TX CHx interrupt clr register
        _strip_end: _CH0_INT_CLR
