LEDC:
  _include: ../../../common_patches/ledc_int.yaml
  _expand_array:
    CH%s_CONF0: {}
    CH%s_HPOINT: {}
    CH%s_DUTY: {}
    CH%s_CONF1: {}
    CH%s_DUTY_R: {}

    TIMER%s_CONF: {}
    TIMER%s_VALUE: {}

  _cluster:
    CH%s:
      CH?_CONF0:
        name: CONF0
        _strip_end: _CH
      CH?_HPOINT:
        name: HPOINT
        _strip_end: _CH
      CH?_DUTY:
        name: DUTY
        _strip_end: _CH
      CH?_CONF1:
        name: CONF1
        _strip_end: _CH
      CH?_DUTY_R:
        name: DUTY_R
        _modify:
          DUTY_CH_R:
            name: DUTY_R

    TIMER%s:
      TIMER?_CONF:
        name: CONF
        _strip: TIMER_
        _strip_end: _TIMER
      TIMER?_VALUE:
        name: VALUE
        _strip: TIMER_

PCNT:
  _expand_array:
    U%s_CONF0: {}
    U%s_CONF1: {}
    U%s_CONF2: {}

  _cluster:
    UNIT%s:
      U?_CONF0:
        name: CONF0
        description: Configuration register 0 for unit
        _strip_end: _U
        _modify:
          CH?_POS_MODE:
            derivedFrom: CH%s_NEG_MODE
          CH?_LCTRL_MODE:
            derivedFrom: CH%s_HCTRL_MODE
        _array:
          CH?_NEG_MODE:
            description: Configures the behavior when the signal input of channel %s detects a negative edge.
          CH?_POS_MODE:
            description: Configures the behavior when the signal input of channel %s detects a positive edge.
          CH?_HCTRL_MODE:
            description: Configures how the CHn_POS_MODE/CHn_NEG_MODE settings will be modified when the control signal is high.
          CH?_LCTRL_MODE:
            description: Configures how the CHn_POS_MODE/CHn_NEG_MODE settings will be modified when the control signal is low.
        CH?_NEG_MODE:
          _name: EdgeMode
          Increment: [1, Increase the counter]
          Decrement: [2, Decrease the counter]
          Hold: [-1, No effect on counter]
        CH?_HCTRL_MODE:
          _name: CtrlMode
          Keep: [0, No modification]
          Reverse:
            [1, Invert behavior (increase -> decrease, decrease -> increase)]
          Disable: [-1, Inhibit counter modification]
      U?_CONF1:
        name: CONF1
        _strip_end: _U
      U?_CONF2:
        name: CONF2
        _strip_end: _U

  INT_RAW:
    _strip_end: _INT_RAW
    _array:
      CNT_THR_EVENT_U?: {}
  INT_ST:
    _strip_end: _INT_ST
    _array:
      CNT_THR_EVENT_U?: {}
  INT_ENA:
    _strip_end: _INT_ENA
    _array:
      CNT_THR_EVENT_U?: {}
  INT_CLR:
    _strip_end: _INT_CLR
    _array:
      CNT_THR_EVENT_U?: {}

  U%s_CNT:
    _modify:
      PULSE_CNT_U:
        name: CNT
  U%s_STATUS:
    _strip: CNT_THR_
    _strip_end: _LAT_U
    _modify:
      ZERO_MODE_U:
        name: ZERO_MODE

  CTRL:
    _array:
      PULSE_CNT_RST_U?:
        name: CNT_RST_U%s
      CNT_PAUSE_U?: {}
      DALTA_CHANGE_EN_U?: {}

MCPWM0:
  _expand_array:
    TIMER%s_CFG0: {}
    TIMER%s_CFG1: {}
    TIMER%s_SYNC: {}
    TIMER%s_STATUS: {}
    GEN%s_STMP_CFG: {}
    GEN%s_TSTMP_A: {}
    GEN%s_TSTMP_B: {}
    GEN%s_CFG0: {}
    GEN%s_FORCE: {}
    GEN%s_A: {}
    GEN%s_B: {}
    DT%s_CFG: {}
    DT%s_FED_CFG: {}
    DT%s_RED_CFG: {}
    CARRIER%s_CFG: {}
    FH%s_CFG0: {}
    FH%s_CFG1: {}
    FH%s_STATUS: {}

  _cluster:
    TIMER%s:
      TIMER?_CFG0:
        name: CFG0
        _strip: TIMER_
      TIMER?_CFG1:
        name: CFG1
        _strip: TIMER_
      TIMER?_SYNC:
        name: SYNC
        _strip: TIMER_
      TIMER?_STATUS:
        name: STATUS
        _strip: TIMER_

    CH%s:
      _array:
        GEN_?:
          name: GEN%s

      GEN?_STMP_CFG:
        _strip: CMPR_
      GEN?_TSTMP_A:
        _strip: CMPR_
      GEN?_TSTMP_B:
        _strip: CMPR_
      GEN?_CFG0:
        _strip: GEN_
      GEN?_FORCE:
        _strip: GEN_
      GEN?_A:
        description: Actions triggered by events on PWMxA
      GEN?_B:
        description: Actions triggered by events on PWMxB
      DT?_CFG:
        _strip: DB_
      DT?_FED_CFG:
        _strip: DB_
      DT?_RED_CFG:
        _strip: DB_
      CARRIER?_CFG:
        _strip: CHOPPER_
      FH?_CFG0:
        _strip: TZ_
      FH?_CFG1:
        _strip: TZ_
      FH?_STATUS:
        _strip: TZ_

  CAP_CH%s_CFG:
    _strip: CAP_
  CAP_CH%s:
    _strip: CAP_
  "EVT_EN,EVT_EN2":
    _strip: EVT_
    _strip_end: _EN
  TASK_EN:
    _strip: TASK_
    _strip_end: _EN

  _include: ../../../common_patches/int_strip.yaml

