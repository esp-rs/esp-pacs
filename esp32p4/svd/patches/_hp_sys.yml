HP_SYS:
  _strip: "HP_"

  "*":
    _strip: "HP_"

  _modify:
    CPU_INT_FROM_CPU_0:
      name: CPU_INTR_FROM_CPU_0
    CPU_INT_FROM_CPU_1:
      name: CPU_INTR_FROM_CPU_1
    CPU_INT_FROM_CPU_2:
      name: CPU_INTR_FROM_CPU_2
    CPU_INT_FROM_CPU_3:
      name: CPU_INTR_FROM_CPU_3

  _add:
    SYSTEM_USB_OTGHS_PHY_ST:
      description: USB OTG HS PHY status
      addressOffset: 0x1e8
      size: 0x20
      access: read-write
      fields:
        VAL:
          bitOffset: 0
          bitWidth: 32
          access: read-write
    SYSTEM_CPU_WAKEUP_EVENT:
      description: CPU wakeup event
      addressOffset: 0x1ec
      size: 0x20
      access: read-write
      fields:
        VAL:
          bitOffset: 0
          bitWidth: 32
          access: read-write
    SYSTEM_HP2LP_INTR_GROUP%s_EN:
      description: HP to LP interrupt group %s enable
      addressOffset: 0x1f0
      dim: 4
      dimIncrement: 0x4
      size: 0x20
      access: read-write
      fields:
        VAL:
          bitOffset: 0
          bitWidth: 32
          access: read-write
    SYSTEM_HP2LP_INTR_GROUP%s_ST:
      description: HP to LP interrupt group %s status
      addressOffset: 0x200
      dim: 4
      dimIncrement: 0x4
      size: 0x20
      access: read-only
      fields:
        VAL:
          bitOffset: 0
          bitWidth: 32
          access: read-only
    SYSTEM_HP2LP_WAKEUP_GROUP%s_EN:
      description: HP to LP wakeup group %s enable
      addressOffset: 0x210
      dim: 4
      dimIncrement: 0x4
      size: 0x20
      access: read-write
      fields:
        VAL:
          bitOffset: 0
          bitWidth: 32
          access: read-write

  CPU_INTR_FROM_CPU_0:
    _modify:
      CPU_INT_FROM_CPU_0:
        name: CPU_INTR_FROM_CPU_0
  CPU_INTR_FROM_CPU_1:
    _modify:
      CPU_INT_FROM_CPU_1:
        name: CPU_INTR_FROM_CPU_1
  CPU_INTR_FROM_CPU_2:
    _modify:
      CPU_INT_FROM_CPU_2:
        name: CPU_INTR_FROM_CPU_2
  CPU_INTR_FROM_CPU_3:
    _modify:
      CPU_INT_FROM_CPU_3:
        name: CPU_INTR_FROM_CPU_3
