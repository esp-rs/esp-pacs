MCPWM0:
  CAP_STATUS:
    _array:
      CAP?_EDGE:
        description: Describes the last captured edge on channel%s.
    CAP?_EDGE:
      Rising: [0, "Rising edge"]
      Falling: [1, "Falling edge"]

  CAP_CH%s_CFG:
    _modify:
      MODE:
        description: Describes which edges to trigger a capture event
        name: CAP_MODE
    CAP_MODE:
      None: [0, "Capture nothing"]
      FallingEdge: [1, "Capture falling edges"]
      RisingEdge: [2, "Capture rising edges"]
      AnyEdge: [3, "Capture any edges"]

  TIMER_SYNCI_CFG:
    _array:
      TIMER?_SYNCISEL: {}
      EXTERNAL_SYNCI?_INVERT: {}

  OPERATOR_TIMERSEL:
    _array:
      OPERATOR?_TIMERSEL: {}

  INT_RAW:
    _array:
      TIMER?_STOP:
        description: The interrupt raw bit for the timer%s stop event.
      TIMER?_TEZ:
        description: The interrupt raw bit for the timer%s zero event.
      TIMER?_TEP:
        description: The interrupt raw bit for the timer%s period event.
      FAULT?:
        description: The interrupt raw bit for the fault%s event.
      FAULT?_CLR:
        description: The interrupt raw bit for the fault%s clear event.
      CAP?:
        description: The interrupt raw bit for the capture%s event.
      CMPR?_TEA:
        description: The interrupt raw bit for the operator%s compare A event.
      CMPR?_TEB:
        description: The interrupt raw bit for the operator%s compare B event.
      TZ?_CBC:
        description: The interrupt raw bit for the fault handler%s cycle-by-cycle mode action.
      TZ?_OST:
        description: The interrupt raw bit for the fault handler%s one-shot mode action.

  INT_ST:
    _array:
      TIMER?_STOP:
        description: The interrupt status bit for the timer%s stop event.
      TIMER?_TEZ:
        description: The interrupt status bit for the timer%s zero event.
      TIMER?_TEP:
        description: The interrupt status bit for the timer%s period event.
      FAULT?:
        description: The interrupt status bit for the fault%s event.
      FAULT?_CLR:
        description: The interrupt status bit for the fault%s clear event.
      CAP?:
        description: The interrupt status bit for the capture%s event.
      CMPR?_TEA:
        description: The interrupt status bit for the operator%s compare A event.
      CMPR?_TEB:
        description: The interrupt status bit for the operator%s compare B event.
      TZ?_CBC:
        description: The interrupt status bit for the fault handler%s cycle-by-cycle mode action.
      TZ?_OST:
        description: The interrupt status bit for the fault handler%s one-shot mode action.

  INT_ENA:
    _array:
      TIMER?_STOP:
        description: The interrupt enable bit for the timer%s stop event.
      TIMER?_TEZ:
        description: The interrupt enable bit for the timer%s zero event.
      TIMER?_TEP:
        description: The interrupt enable bit for the timer%s period event.
      FAULT?:
        description: The interrupt enable bit for the fault%s event.
      FAULT?_CLR:
        description: The interrupt enable bit for the fault%s clear event.
      CAP?:
        description: The interrupt enable bit for the capture%s event.
      CMPR?_TEA:
        description: The interrupt enable bit for the operator%s compare A event.
      CMPR?_TEB:
        description: The interrupt enable bit for the operator%s compare B event.
      TZ?_CBC:
        description: The interrupt enable bit for the fault handler%s cycle-by-cycle mode action.
      TZ?_OST:
        description: The interrupt enable bit for the fault handler%s one-shot mode action.

  INT_CLR:
    _array:
      TIMER?_STOP:
        description: The interrupt clear bit for the timer%s stop event.
      TIMER?_TEZ:
        description: The interrupt clear bit for the timer%s zero event.
      TIMER?_TEP:
        description: The interrupt clear bit for the timer%s period event.
      FAULT?:
        description: The interrupt clear bit for the fault%s event.
