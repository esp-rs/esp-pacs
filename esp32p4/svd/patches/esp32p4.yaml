_svd: "../esp32p4.base.svd"

_include:
  - ../../../common_patches/clic.yaml
  - ../../../common_patches/emac.yaml
  - ../../../common_patches/twai.yaml
  - "_axi_icm.yml"
  - "_icm_axi_qos.yml"
  - "_interrupt.yml"
  - "_ecc.yml"
  - "_efuse.yml"
  - "_ledc_gamma.yml"
  - "_aes.yml"
  - "_ds.yml"
  - "_ecdsa.yml"
  - "_gpio.yml"
  - "_hmac.yml"
  - "_hp_sys_clkrst.yml"
  - "_hp_sys.yml"
  - "_io_mux.yml"
  - "_isp.yml"
  - "_lp_huk.yml"
  - "_lp_sys.yml"
  - "_mipi_dsi_bridge.yml"
  - "_parl_io.yml"
  - "_ppa.yml"
  - "_pvt.yml"
  - "_rsa.yml"
  - "_sha.yml"
  - "_spi0.yml"
  - "_timg.yml"
  - "_uart.yml"
  - "_usb_device.yml"
  - "_collect.yml"

_modify:
  SPI?:
    groupName: SPI
  RMT:
    baseAddress: 0x500a2000
  PAU:
    baseAddress: 0x50082000
  "AHB_DMA,AXI_DMA,DMA":
    groupName: DMA
  LP_ANA_PERI:
    name: LP_ANA
    groupName: LP_ANA
  LCD_CAM:
    groupName: LCD_CAM

ADC:
  ARB_CTRL:
    _strip: ARB_
  DMA_CONF:
    _strip: APB_
  "INT_*":
    _modify:
      "APB_SARADC1_DONE*,SAR1_DONE*":
        name: ADC1_DONE
      "APB_SARADC2_DONE*,SAR2_DONE*":
        name: ADC2_DONE
  _include: ../../../common_patches/int_strip.yaml

BITSCRAMBLER:
  _modify:
    TX_STATE:
      resetValue: 0x01
    VERSION:
      resetValue: 0x02303240

LP_ANA:
  _strip: LP_ANA_
  "*":
    _strip: LP_ANA_
  _include: ../../../common_patches/lpana_int_strip.yaml

I2C0:
  _modify:
    INT_STATUS:
      name: INT_ST
  _include:
    - ../../../common_patches/int_strip.yaml
    - ../../../common_patches/i2c0.yaml
    - ../../../common_patches/i2c_st_timeouts.yaml

I2C1:
  _include:
    - ../../../common_patches/i2c_st_timeouts.yaml

SPI[01]:
  _strip: SPI_MEM_
  "*":
    _strip: SPI_MEM_

"EFUSE,I2S0,UART0,SPI[01],LP_WDT,PARL_IO,PAU,USB_DEVICE,MIPI_CSI_BRIDGE,MIPI_DSI_BRIDGE,ECDSA,GPIO,H264,PPA,RMT,LP_TOUCH,LP_TSENS,ISP,LP_HUK,LP_I2S0,LP_UART":
  _include: ../../../common_patches/int_strip.yaml

UART0:
  CLK_CONF:
    _add:
      RST_CORE:
        description: Write 1 then write 0 to this bit, reset UART Tx/Rx.
        bitOffset: 23
        bitWidth: 1
        access: read-write

ECC:
  _include: ../../../common_patches/ecc_int_strip.yaml

GPIO:
  _modify:
    _interrupts:
      GPIO_INT0:
        name: GPIO

GPIO_SD:
  _include: ../../../common_patches/gpiosd_ext.yaml

I3C_MST:
  _modify:
    INT_ST_ENA:
      name: INT_ENA
  _include: ../../../common_patches/int_strip.yaml

JPEG:
  _include: ../../../common_patches/int_strip.yaml
  _array:
    C?: {}

PMU:
  _include: ../../../common_patches/pmu_int_strip.yaml

LP_TIMER:
  _include: ../../../common_patches/lptim_int_strip.yaml

UHCI0:
  _include:
    - ../../../common_patches/uhci_collect.yaml
    - ../../../common_patches/int_strip.yaml

TIMG0:
  _include: ../../../common_patches/tim_expand_and_collect.yaml
  _modify:
    _interrupts:
      TG0_T0:
        name: TG0_T0_LEVEL
      TG0_T1:
        name: TG0_T1_LEVEL
      TG0_WDT:
        name: TG0_WDT_LEVEL

TIMG1:
  _modify:
    _interrupts:
      TG1_T0:
        name: TG1_T0_LEVEL
      TG1_T1:
        name: TG1_T1_LEVEL
      TG1_WDT:
        name: TG1_WDT_LEVEL

SPI1:
  _include: ../../../common_patches/spi_w.yaml

SPI[23]:
  _strip: SPI_
  "*":
    _strip: SPI_
  _include:
    - ../../../common_patches/spi_dma_int_strip.yaml
    - ../../../common_patches/spi_w.yaml

SOC_ETM:
  _include: ../../../common_patches/etm_collect.yaml

SYSTIMER:
  _include:
    - ../../../common_patches/int_strip.yaml
    - ../../../common_patches/systimer.yaml
    - ../../../common_patches/systimer_real_target.yaml

LCD_CAM:
  LCD_DLY_MODE_CFG1:
    DOUT*_MODE:
      _name: DelayMode
      None: [0, Output without delay]
      RaisingEdge: [1, Delayed by the rising edge of LCD_CLK]
      FallingEdge: [2, Delayed by the falling edge of LCD_CLK]
    _array:
      DOUT*_MODE:
        description: The output data bit %s is delayed by module clock LCD_CLK
  LCD_DLY_MODE_CFG2:
    _modify:
      DOUT*_MODE:
        derivedFrom: LCD_CAM.LCD_DLY_MODE_CFG1.DOUT%s_MODE
    _array:
      DOUT*_MODE:
        description: The output data bit %s is delayed by module clock LCD_CLK

HP_SYS:
  _add:
    _interrupts:
      FROM_CPU_INTR0:
        value: 79
      FROM_CPU_INTR1:
        value: 80
      FROM_CPU_INTR2:
        value: 81
      FROM_CPU_INTR3:
        value: 82
  _include: ../../../common_patches/sw_interrupts.yaml
