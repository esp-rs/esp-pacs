LP_I2C0:
  _strip: "LP_I2C_"
  "*":
    _strip: "LP_I2C_"
  _modify:
    INT_STATUS:
      name: INT_ST
  DATA:
    _modify:
      FIFO_RDATA:
        access: read-write
  COMD?:
    _modify:
      COMMAND?:
        name: COMMAND
      COMMAND?_DONE:
        name: COMMAND_DONE
  _array:
    COMD?: {}
  _include: ../../../common_patches/int_strip.yaml
