            bitWidth: 1
            access: read-write
          ICACHE2_MEM_OBJECT:
            description: "Reserved"
            bitOffset: 8
            bitWidth: 1
            access: read-write
          CACHE_MEM_OBJECT:
            description: "Set this bit to set Cache data memory as object. This bit should be onehot with the others fields inside this register."
