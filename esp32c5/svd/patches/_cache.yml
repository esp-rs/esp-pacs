_add:
  CACHE:
    description: Cache controller, preload/sync, and performance counters
    baseAddress: 0x600C8000
    groupName: CACHE
    addressBlock:
      offset: 0x0
      size: 0x400
      usage: registers
    registers:
      ICACHE_CTRL:
        description: "Instruction cache (ICache) control register"
        addressOffset: 0x0
        size: 32
        access: read-write
        fields:
          ICACHE_SHUT_IBUS2:
            description: "Reserved"
            bitOffset: 2
            bitWidth: 1
            access: read-write
          ICACHE_SHUT_IBUS3:
            description: "Reserved"
            bitOffset: 3
            bitWidth: 1
            access: read-write
      CACHE_CTRL:
        description: "Data cache control register"
        addressOffset: 0x4
        size: 32
        access: read-write
        fields:
          CACHE_SHUT_BUS0:
            description: "The bit is used to disable core0 bus0 access Cache, 0: enable, 1: disable"
            bitOffset: 0
            bitWidth: 1
            access: read-write
          CACHE_SHUT_BUS1:
            description: "The bit is used to disable core0 bus1 access Cache, 0: enable, 1: disable"
            bitOffset: 1
            bitWidth: 1
            access: read-write
      ICACHE_CACHESIZE_CONF:
        description: "Instruction Cache CacheSize mode configure register"
        addressOffset: 0x10
        size: 32
        access: read-only
        fields:
          ICACHE_CACHESIZE_4K:
            description: "The field is used to configure cachesize of ICache as 4k bytes. This field and all other fields within this register is onehot."
            bitOffset: 4
            bitWidth: 1
            access: read-only
      ICACHE_BLOCKSIZE_CONF:
        description: "Instruction Cache BlockSize mode configure register"
        addressOffset: 0x14
        size: 32
        access: read-only
        fields:
          ICACHE_BLOCKSIZE_64:
            description: "The field is used to configureblocksize of ICache as 64 bytes. This field and all other fields within this register is onehot."
            bitOffset: 3
            bitWidth: 1
            access: read-only
      CACHE_CACHESIZE_CONF:
        description: "Data Cache CacheSize mode configure register"
        addressOffset: 0x18
        size: 32
        access: read-only
        fields:
          DCACHE_CACHESIZE_32K:
            description: "The field is used to configure cachesize of DCache as 32k bytes. This field and all other fields within this register is onehot."
            bitOffset: 7
            bitWidth: 1
            access: read-only
      CACHE_BLOCKSIZE_CONF:
        description: "Data Cache BlockSize mode configure register"
        addressOffset: 0x1c
        size: 32
        access: read-only
        fields:
          CACHE_BLOCKSIZE_32:
            description: "The field is used to configureblocksize of DCache as 32 bytes. This field and all other fields within this register is onehot."
            bitOffset: 2
            bitWidth: 1
            access: read-only
      CACHE_WRAP_AROUND_CTRL:
        description: "Cache wrap around control register"
        addressOffset: 0x20
        size: 32
        access: read-write
        fields:
          ICACHE2_WRAP:
            description: "Reserved"
            bitOffset: 2
            bitWidth: 1
            access: read-write
          CACHE_WRAP:
            description: "Set this bit as 1 to enable DCache wrap around mode."
            bitOffset: 4
            bitWidth: 1
            access: read-write
      CACHE_MISS_ACCESS_CTRL:
        description: "Cache wrap around control register"
        addressOffset: 0x24
        size: 32
        access: read-write
        fields:
          ICACHE2_MISS_DISABLE_ACCESS:
            description: "Reserved"
            bitOffset: 2
            bitWidth: 1
            access: read-write
          CACHE_MISS_DISABLE_ACCESS:
            description: "Set this bit as 1 to disable early restart of DCache"
            bitOffset: 4
            bitWidth: 1
            access: read-write
      CACHE_FREEZE_CTRL:
        description: "Cache Freeze control register"
        addressOffset: 0x28
        size: 32
        access: read-write
        fields:
          ICACHE2_FREEZE_EN:
            description: "Reserved"
            bitOffset: 8
            bitWidth: 1
            access: read-write
          ICACHE2_FREEZE_MODE:
            description: "Reserved"
            bitOffset: 9
            bitWidth: 1
            access: read-write
          CACHE_FREEZE_EN:
            description: "The bit is used to enable freeze operation on Cache. It can be cleared by software."
            bitOffset: 16
            bitWidth: 1
            access: read-write
          CACHE_FREEZE_MODE:
            description: "The bit is used to configure mode of freeze operation Cache. 0: a miss-access will not stuck. 1: a miss-access will stuck."
            bitOffset: 17
            bitWidth: 1
            access: read-write
          CACHE_FREEZE_DONE:
            description: "The bit is used to indicate whether freeze operation on Cache is finished or not. 0: not finished. 1: finished."
            bitOffset: 18
            bitWidth: 1
            access: read-only
      CACHE_DATA_MEM_ACS_CONF:
        description: "Cache data memory access configure register"
        addressOffset: 0x2c
        size: 32
        access: read-write
        fields:
          ICACHE2_DATA_MEM_RD_EN:
            description: "Reserved"
            bitOffset: 8
            bitWidth: 1
            access: read-write
          ICACHE2_DATA_MEM_WR_EN:
            description: "Reserved"
            bitOffset: 9
            bitWidth: 1
            access: read-write
          CACHE_DATA_MEM_RD_EN:
            description: "The bit is used to enable config-bus read Cache data memoryory. 0: disable, 1: enable."
            bitOffset: 16
            bitWidth: 1
            access: read-write
          CACHE_DATA_MEM_WR_EN:
            description: "The bit is used to enable config-bus write Cache data memoryory. 0: disable, 1: enable."
            bitOffset: 17
            bitWidth: 1
            access: read-write
      CACHE_TAG_MEM_ACS_CONF:
        description: "Cache tag memory access configure register"
        addressOffset: 0x30
        size: 32
        access: read-write
        fields:
          ICACHE2_TAG_MEM_RD_EN:
            description: "Reserved"
            bitOffset: 8
            bitWidth: 1
            access: read-write
          ICACHE2_TAG_MEM_WR_EN:
            description: "Reserved"
            bitOffset: 9
            bitWidth: 1
            access: read-write
          CACHE_TAG_MEM_RD_EN:
            description: "The bit is used to enable config-bus read Cache tag memoryory. 0: disable, 1: enable."
            bitOffset: 16
            bitWidth: 1
            access: read-write
          CACHE_TAG_MEM_WR_EN:
            description: "The bit is used to enable config-bus write Cache tag memoryory. 0: disable, 1: enable."
            bitOffset: 17
            bitWidth: 1
            access: read-write
      ICACHE2_PRELOCK_CONF:
        description: "Instruction Cache 2 prelock configure register"
        addressOffset: 0x54
        size: 32
        access: read-write
        fields:
          ICACHE2_PRELOCK_SCT0_EN:
            description: "The bit is used to enable the first section of prelock function on ICache2."
            bitOffset: 0
            bitWidth: 1
            access: read-write
          ICACHE2_PRELOCK_SCT1_EN:
            description: "The bit is used to enable the second section of prelock function on ICache2."
            bitOffset: 1
            bitWidth: 1
            access: read-write
          ICACHE2_PRELOCK_RGID:
            description: "The bit is used to set the gid of icache2 prelock."
            bitOffset: 2
            bitWidth: 4
            access: read-write
      ICACHE2_PRELOCK_SCT0_ADDR:
        description: "Instruction Cache 2 prelock section0 address configure register"
        addressOffset: 0x58
        size: 32
        access: read-write
        fields:
          ICACHE2_PRELOCK_SCT0_ADDR:
            description: "Those bits are used to configure the start address of the first section of prelock on ICache2, which should be used together with ICACHE2_PRELOCK_SCT0_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      ICACHE2_PRELOCK_SCT1_ADDR:
        description: "Instruction Cache 2 prelock section1 address configure register"
        addressOffset: 0x5c
        size: 32
        access: read-write
        fields:
          ICACHE2_PRELOCK_SCT1_ADDR:
            description: "Those bits are used to configure the start address of the second section of prelock on ICache2, which should be used together with ICACHE2_PRELOCK_SCT1_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      ICACHE2_PRELOCK_SCT_SIZE:
        description: "Instruction Cache 2 prelock section size configure register"
        addressOffset: 0x60
        size: 32
        access: read-write
        fields:
          ICACHE2_PRELOCK_SCT0_SIZE:
            description: "Those bits are used to configure the size of the first section of prelock on ICache2, which should be used together with ICACHE2_PRELOCK_SCT0_ADDR_REG"
            bitOffset: 0
            bitWidth: 14
            access: read-write
          ICACHE2_PRELOCK_SCT1_SIZE:
            description: "Those bits are used to configure the size of the second section of prelock on ICache2, which should be used together with ICACHE2_PRELOCK_SCT1_ADDR_REG"
            bitOffset: 16
            bitWidth: 14
            access: read-write
      CACHE_PRELOCK_CONF:
        description: "Cache prelock configure register"
        addressOffset: 0x74
        size: 32
        access: read-write
        fields:
          CACHE_PRELOCK_SCT0_EN:
            description: "The bit is used to enable the first section of prelock function on Cache."
            bitOffset: 0
            bitWidth: 1
            access: read-write
          CACHE_PRELOCK_SCT1_EN:
            description: "The bit is used to enable the second section of prelock function on Cache."
            bitOffset: 1
            bitWidth: 1
            access: read-write
          CACHE_PRELOCK_RGID:
            description: "The bit is used to set the gid of cache prelock."
            bitOffset: 2
            bitWidth: 4
            access: read-only
      CACHE_PRELOCK_SCT0_ADDR:
        description: "Cache prelock section0 address configure register"
        addressOffset: 0x78
        size: 32
        access: read-write
        fields:
          CACHE_PRELOCK_SCT0_ADDR:
            description: "Those bits are used to configure the start address of the first section of prelock on Cache, which should be used together with CACHE_PRELOCK_SCT0_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      DCACHE_PRELOCK_SCT1_ADDR:
        description: "Cache prelock section1 address configure register"
        addressOffset: 0x7c
        size: 32
        access: read-write
        fields:
          CACHE_PRELOCK_SCT1_ADDR:
            description: "Those bits are used to configure the start address of the second section of prelock on Cache, which should be used together with CACHE_PRELOCK_SCT1_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      DCACHE_PRELOCK_SCT_SIZE:
        description: "Cache prelock section size configure register"
        addressOffset: 0x80
        size: 32
        access: read-write
        fields:
          CACHE_PRELOCK_SCT0_SIZE:
            description: "Those bits are used to configure the size of the first section of prelock on Cache, which should be used together with CACHE_PRELOCK_SCT0_ADDR_REG"
            bitOffset: 0
            bitWidth: 14
            access: read-write
          CACHE_PRELOCK_SCT1_SIZE:
            description: "Those bits are used to configure the size of the second section of prelock on Cache, which should be used together with CACHE_PRELOCK_SCT1_ADDR_REG"
            bitOffset: 16
            bitWidth: 14
            access: read-write
      LOCK_CTRL:
        description: "Lock-class (manual lock) operation control register"
        addressOffset: 0x84
        size: 32
        access: read-write
        fields:
          LOCK_ENA:
            description: "The bit is used to enable lock operation. It will be cleared by hardware after lock operation done"
            bitOffset: 0
            bitWidth: 1
            access: read-write
          UNLOCK_ENA:
            description: "The bit is used to enable unlock operation. It will be cleared by hardware after unlock operation done"
            bitOffset: 1
            bitWidth: 1
            access: read-write
          LOCK_DONE:
            description: "The bit is used to indicate whether unlock/lock operation is finished or not. 0: not finished. 1: finished."
            bitOffset: 2
            bitWidth: 1
            access: read-only
          LOCK_RGID:
            description: "The bit is used to set the gid of cache lock/unlock."
            bitOffset: 3
            bitWidth: 4
            access: read-only
      LOCK_MAP:
        description: "Lock (manual lock) map configure register"
        addressOffset: 0x88
        size: 32
        access: read-write
        fields:
          LOCK_MAP:
            description: "Those bits are used to indicate which caches in the two-level cache structure will apply this lock/unlock operation. [4]: Cache"
            bitOffset: 0
            bitWidth: 6
            access: read-write
      LOCK_ADDR:
        description: "Lock (manual lock) address configure register"
        addressOffset: 0x8c
        size: 32
        access: read-write
        fields:
          LOCK_ADDR:
            description: "Those bits are used to configure the start address of the lock/unlock operation, which should be used together with CACHE_LOCK_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      LOCK_SIZE:
        description: "Lock (manual lock) size configure register"
        addressOffset: 0x90
        size: 32
        access: read-write
        fields:
          LOCK_SIZE:
            description: "Those bits are used to configure the size of the lock/unlock operation, which should be used together with CACHE_LOCK_ADDR_REG"
            bitOffset: 0
            bitWidth: 16
            access: read-write
      SYNC_CTRL:
        description: "Sync-class operation control register"
        addressOffset: 0x94
        size: 32
        access: read-write
        fields:
          INVALIDATE_ENA:
            description: "The bit is used to enable invalidate operation. It will be cleared by hardware after invalidate operation done. Note that this bit and the other sync-bits (clean_ena, writeback_ena, writeback_invalidate_ena) are mutually exclusive, that is, those bits can not be set to 1 at the same time."
            bitOffset: 0
            bitWidth: 1
            access: read-write
          CLEAN_ENA:
            description: "The bit is used to enable clean operation. It will be cleared by hardware after clean operation done. Note that this bit and the other sync-bits (invalidate_ena, writeback_ena, writeback_invalidate_ena) are mutually exclusive, that is, those bits can not be set to 1 at the same time."
            bitOffset: 1
            bitWidth: 1
            access: read-write
          WRITEBACK_ENA:
            description: "The bit is used to enable writeback operation. It will be cleared by hardware after writeback operation done. Note that this bit and the other sync-bits (invalidate_ena, clean_ena, writeback_invalidate_ena) are mutually exclusive, that is, those bits can not be set to 1 at the same time."
            bitOffset: 2
            bitWidth: 1
            access: read-write
          WRITEBACK_INVALIDATE_ENA:
            description: "The bit is used to enable writeback-invalidate operation. It will be cleared by hardware after writeback-invalidate operation done. Note that this bit and the other sync-bits (invalidate_ena, clean_ena, writeback_ena) are mutually exclusive, that is, those bits can not be set to 1 at the same time."
            bitOffset: 3
            bitWidth: 1
            access: read-write
          SYNC_DONE:
            description: "The bit is used to indicate whether sync operation (invalidate, clean, writeback, writeback_invalidate) is finished or not. 0: not finished. 1: finished."
            bitOffset: 4
            bitWidth: 1
            access: read-only
          SYNC_RGID:
            description: "The bit is used to set the gid of cache sync operation (invalidate, clean, writeback, writeback_invalidate)"
            bitOffset: 5
            bitWidth: 4
            access: read-only
      SYNC_MAP:
        description: "Sync map configure register"
        addressOffset: 0x98
        size: 32
        access: read-write
        fields:
          SYNC_MAP:
            description: "Those bits are used to indicate which caches in the two-level cache structure will apply the sync operation. [4]: Cache"
            bitOffset: 0
            bitWidth: 6
            access: read-write
      SYNC_ADDR:
        description: "Sync address configure register"
        addressOffset: 0x9c
        size: 32
        access: read-write
        fields:
          SYNC_ADDR:
            description: "Those bits are used to configure the start address of the sync operation, which should be used together with CACHE_SYNC_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      SYNC_SIZE:
        description: "Sync size configure register"
        addressOffset: 0xa0
        size: 32
        access: read-write
        fields:
          SYNC_SIZE:
            description: "Those bits are used to configure the size of the sync operation, which should be used together with CACHE_SYNC_ADDR_REG"
            bitOffset: 0
            bitWidth: 25
            access: read-write
      ICACHE2_PRELOAD_CTRL:
        description: "Instruction Cache 2 preload-operation control register"
        addressOffset: 0xbc
        size: 32
        access: read-write
        fields:
          ICACHE2_PRELOAD_ENA:
            description: "The bit is used to enable preload operation on ICache2. It will be cleared by hardware automatically after preload operation is done."
            bitOffset: 0
            bitWidth: 1
            access: read-write
          ICACHE2_PRELOAD_DONE:
            description: "The bit is used to indicate whether preload operation is finished or not. 0: not finished. 1: finished."
            bitOffset: 1
            bitWidth: 1
            access: read-only
          ICACHE2_PRELOAD_ORDER:
            description: "The bit is used to configure the direction of preload operation. 0: ascending, 1: descending."
            bitOffset: 2
            bitWidth: 1
            access: read-write
          ICACHE2_PRELOAD_RGID:
            description: "The bit is used to set the gid of icache2 preload."
            bitOffset: 3
            bitWidth: 4
            access: read-write
      ICACHE2_PRELOAD_ADDR:
        description: "Instruction Cache 2 preload address configure register"
        addressOffset: 0xc0
        size: 32
        access: read-write
        fields:
          ICACHE2_PRELOAD_ADDR:
            description: "Those bits are used to configure the start address of preload on ICache2, which should be used together with ICACHE2_PRELOAD_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      ICACHE2_PRELOAD_SIZE:
        description: "Instruction Cache 2 preload size configure register"
        addressOffset: 0xc4
        size: 32
        access: read-write
        fields:
          ICACHE2_PRELOAD_SIZE:
            description: "Those bits are used to configure the size of the first section of prelock on ICache2, which should be used together with ICACHE2_PRELOAD_ADDR_REG"
            bitOffset: 0
            bitWidth: 14
            access: read-write
      CACHE_PRELOAD_CTRL:
        description: "Cache preload-operation control register"
        addressOffset: 0xd4
        size: 32
        access: read-write
        fields:
          CACHE_PRELOAD_ENA:
            description: "The bit is used to enable preload operation on Cache. It will be cleared by hardware automatically after preload operation is done."
            bitOffset: 0
            bitWidth: 1
            access: read-write
          CACHE_PRELOAD_DONE:
            description: "The bit is used to indicate whether preload operation is finished or not. 0: not finished. 1: finished."
            bitOffset: 1
            bitWidth: 1
            access: read-only
          CACHE_PRELOAD_ORDER:
            description: "The bit is used to configure the direction of preload operation. 0: ascending, 1: descending."
            bitOffset: 2
            bitWidth: 1
            access: read-write
          CACHE_PRELOAD_RGID:
            description: "The bit is used to set the gid of cache preload."
            bitOffset: 3
            bitWidth: 4
            access: read-only
      DCACHE_PRELOAD_ADDR:
        description: "Cache preload address configure register"
        addressOffset: 0xd8
        size: 32
        access: read-write
        fields:
          CACHE_PRELOAD_ADDR:
            description: "Those bits are used to configure the start address of preload on Cache, which should be used together with CACHE_PRELOAD_SIZE_REG"
            bitOffset: 0
            bitWidth: 32
            access: read-write
      DCACHE_PRELOAD_SIZE:
        description: "Cache preload size configure register"
        addressOffset: 0xdc
        size: 32
        access: read-write
        fields:
          CACHE_PRELOAD_SIZE:
            description: "Those bits are used to configure the size of the first section of prelock on Cache, which should be used together with CACHE_PRELOAD_ADDR_REG"
            bitOffset: 0
            bitWidth: 14
            access: read-write
      ICACHE2_AUTOLOAD_CTRL:
        description: "Instruction Cache 2 autoload-operation control register"
        addressOffset: 0x108
        size: 32
        access: read-write
        fields:
          ICACHE2_AUTOLOAD_ENA:
            description: "The bit is used to enable and disable autoload operation on ICache2. 1: enable, 0: disable."
            bitOffset: 0
            bitWidth: 1
            access: read-write
          ICACHE2_AUTOLOAD_DONE:
            description: "The bit is used to indicate whether autoload operation on ICache2 is finished or not. 0: not finished. 1: finished."
            bitOffset: 1
            bitWidth: 1
            access: read-only
          ICACHE2_AUTOLOAD_ORDER:
            description: "The bit is used to configure the direction of autoload operation on ICache2. 0: ascending. 1: descending."
            bitOffset: 2
            bitWidth: 1
            access: read-write
          ICACHE2_AUTOLOAD_TRIGGER_MODE:
            description: "The field is used to configure trigger mode of autoload operation on ICache2. 0/3: miss-trigger, 1: hit-trigger, 2: miss-hit-trigger."
            bitOffset: 3
            bitWidth: 2
            access: read-write
          ICACHE2_AUTOLOAD_SCT0_ENA:
            description: "The bit is used to enable the first section for autoload operation on ICache2."
            bitOffset: 8
            bitWidth: 1
            access: read-write
          ICACHE2_AUTOLOAD_SCT1_ENA:
            description: "The bit is used to enable the second section for autoload operation on ICache2."
            bitOffset: 9
            bitWidth: 1
            access: read-write
          ICACHE2_AUTOLOAD_RGID:
            description: "The bit is used to set the gid of icache2 autoload."
            bitOffset: 10
            bitWidth: 4
            access: read-write
      ICACHE2_AUTOLOAD_SCT0_ADDR:
        description: "Instruction Cache 2 autoload section 0 address configure register"
        addressOffset: 0x10c
        size: 32
        access: read-write
        fields:
          ICACHE2_AUTOLOAD_SCT0_ADDR:
            description: "Those bits are used to configure the start address of the first section for autoload operation on ICache2. Note that it should be used together with ICACHE2_AUTOLOAD_SCT0_SIZE and ICACHE_AUTOLOAD_SCT0_ENA."
            bitOffset: 0
            bitWidth: 32
            access: read-write
      ICACHE2_AUTOLOAD_SCT0_SIZE:
        description: "Instruction Cache 2 autoload section 0 size configure register"
        addressOffset: 0x110
        size: 32
        access: read-write
        fields:
          ICACHE2_AUTOLOAD_SCT0_SIZE:
            description: "Those bits are used to configure the size of the first section for autoload operation on ICache2. Note that it should be used together with ICACHE2_AUTOLOAD_SCT0_ADDR and ICACHE_AUTOLOAD_SCT0_ENA."
            bitOffset: 0
            bitWidth: 28
            access: read-write
      ICACHE2_AUTOLOAD_SCT1_ADDR:
        description: "Instruction Cache 2 autoload section 1 address configure register"
        addressOffset: 0x114
        size: 32
        access: read-write
        fields:
          ICACHE2_AUTOLOAD_SCT1_ADDR:
            description: "Those bits are used to configure the start address of the second section for autoload operation on ICache2. Note that it should be used together with ICACHE2_AUTOLOAD_SCT1_SIZE and ICACHE_AUTOLOAD_SCT1_ENA."
            bitOffset: 0
            bitWidth: 32
            access: read-write
      ICACHE2_AUTOLOAD_SCT1_SIZE:
        description: "Instruction Cache 2 autoload section 1 size configure register"
        addressOffset: 0x118
        size: 32
        access: read-write
        fields:
          ICACHE2_AUTOLOAD_SCT1_SIZE:
            description: "Those bits are used to configure the size of the second section for autoload operation on ICache2. Note that it should be used together with ICACHE2_AUTOLOAD_SCT1_ADDR and ICACHE_AUTOLOAD_SCT1_ENA."
            bitOffset: 0
            bitWidth: 28
            access: read-write
      CACHE_AUTOLOAD_CTRL:
        description: "Cache autoload-operation control register"
        addressOffset: 0x130
        size: 32
        access: read-write
        fields:
          CACHE_AUTOLOAD_ENA:
            description: "The bit is used to enable and disable autoload operation on Cache. 1: enable, 0: disable."
            bitOffset: 0
            bitWidth: 1
            access: read-write
          CACHE_AUTOLOAD_DONE:
            description: "The bit is used to indicate whether autoload operation on Cache is finished or not. 0: not finished. 1: finished."
            bitOffset: 1
            bitWidth: 1
            access: read-only
          CACHE_AUTOLOAD_ORDER:
            description: "The bit is used to configure the direction of autoload operation on Cache. 0: ascending. 1: descending."
            bitOffset: 2
            bitWidth: 1
            access: read-write
          CACHE_AUTOLOAD_TRIGGER_MODE:
            description: "The field is used to configure trigger mode of autoload operation on Cache. 0/3: miss-trigger, 1: hit-trigger, 2: miss-hit-trigger."
            bitOffset: 3
            bitWidth: 2
            access: read-write
          CACHE_AUTOLOAD_SCT0_ENA:
            description: "The bit is used to enable the first section for autoload operation on Cache."
            bitOffset: 8
            bitWidth: 1
            access: read-write
          CACHE_AUTOLOAD_SCT1_ENA:
            description: "The bit is used to enable the second section for autoload operation on Cache."
            bitOffset: 9
            bitWidth: 1
            access: read-write
      CACHE_AUTOLOAD_SCT0_ADDR:
        description: "Cache autoload section 0 address configure register"
        addressOffset: 0x134
        size: 32
        access: read-write
        fields:
          CACHE_AUTOLOAD_SCT0_ADDR:
            description: "Those bits are used to configure the start address of the first section for autoload operation on Cache. Note that it should be used together with CACHE_AUTOLOAD_SCT0_SIZE and CACHE_AUTOLOAD_SCT0_ENA."
            bitOffset: 0
            bitWidth: 32
            access: read-write
      CACHE_AUTOLOAD_SCT0_SIZE:
        description: "Cache autoload section 0 size configure register"
        addressOffset: 0x138
        size: 32
        access: read-write
        fields:
          CACHE_AUTOLOAD_SCT0_SIZE:
