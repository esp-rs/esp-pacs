# External memory cache MMU table (DR_REG_MMU_TABLE).
_add:
  MMU_TABLE:
    description: External memory cache MMU table
    groupName: MMU
    baseAddress: 0x600C5000
    addressBlock:
      offset: 0x0
      size: 0x100
      usage: registers
    registers:
      ENTRY%s:
        description: MMU table entry
        addressOffset: 0x0
        dim: 64
        dimIndex: 0-63
        dimIncrement: 0x4
        size: 0x20
        access: read-write
        fields:
          PADDR:
            description: Physical page number
            bitOffset: 0
            bitWidth: 6
            access: read-write
          INVALID:
            description: Set to mark this entry invalid
            bitOffset: 6
            bitWidth: 1
            access: read-write
